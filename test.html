<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Language Dropdown</title>
  <style>
    .dropdown {
      position: relative;
      display: inline-block;
      width: 220px;
      font-family: Arial, sans-serif;
    }

    .dropdown-btn {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      text-align: left;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      width: 100%;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 4px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
    }

    .dropdown-content div {
      padding: 10px 14px;
      cursor: pointer;
    }

    .dropdown-content div:hover {
      background: #f2f2f2;
    }

    .show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="dropdown">
    <button class="dropdown-btn" id="dropdownBtn">English</button>
    <div class="dropdown-content" id="dropdownMenu">
      <div onclick="selectLanguage('English')">English</div>
      <div onclick="selectLanguage('French')">French</div>
      <div onclick="selectLanguage('Spanish')">Spanish</div>
      <div onclick="selectLanguage('German')">German</div>
      <div onclick="selectLanguage('Chinese')">Chinese</div>
    </div>
  </div>

  <script>
    const btn = document.getElementById("dropdownBtn");
    const menu = document.getElementById("dropdownMenu");

    btn.addEventListener("click", () => {
      menu.classList.toggle("show");
    });

    function selectLanguage(language) {
      btn.textContent = language;
      menu.classList.remove("show");
    }

    window.addEventListener("click", function (e) {
      if (!e.target.closest(".dropdown")) {
        menu.classList.remove("show");
      }
    });
  </script>

</body>
</html>
